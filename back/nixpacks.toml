[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.mbstring", "php84Extensions.tokenizer", "php84Extensions.xml", "php84Extensions.ctype", "php84Extensions.fileinfo", "php84Extensions.openssl", "php84Extensions.curl", "composer"]

[phases.build]
cmds = [
  "composer install --optimize-autoloader --no-dev",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[phases.deploy]
cmds = [
  "php artisan migrate --force",
  "php artisan storage:link"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
